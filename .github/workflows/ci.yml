name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      # unsafeptr is disabled: the WH_MOUSE_LL/WH_KEYBOARD_LL hook callbacks
      # legitimately reinterpret a raw LPARAM as a pointer to the hook
      # struct, which vet's heuristic can't distinguish from a genuine bug.
      - run: go vet -unsafeptr=false ./...

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install X11 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libx11-dev xorg-dev libxtst-dev libxkbcommon-dev libxkbcommon-x11-dev libpng-dev libx11-xcb-dev libxcb1-dev libxcb-xkb-dev
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...
